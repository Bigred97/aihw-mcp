    description: Sex (Female, Male, or Persons = both combined).
    role: dimension
    dtype: string
  type:
    source_column: "Type"
    description: Incidence (new diagnoses) or Mortality (deaths).
    role: dimension
    dtype: string
  cancer_type:
    source_column: "Cancer_Type"
