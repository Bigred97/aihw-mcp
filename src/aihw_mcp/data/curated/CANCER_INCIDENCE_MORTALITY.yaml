id: CANCER_INCIDENCE_MORTALITY
name: Australian Cancer Incidence and Mortality (ACIM)
description: |
  AIHW Australian Cancer Incidence and Mortality (ACIM) — annual counts of
  new cancer diagnoses (Incidence) and cancer deaths (Mortality) by year,
  sex, cancer type, and 5-year age band. ~50 cancer types from 1968
  forward, including the major site cancers (breast, bowel, lung,
  prostate, melanoma) and rarer types. Each row carries 19 age-band
  counts as separate columns (Age_0_to_4 … Age_85+, Age_Unknown).
  Source: AIHW via data.gov.au.
period_coverage: 1968 to most recent published year
update_frequency: annual
source_url: https://data.gov.au/data/dataset/australian-cancer-incidence-and-mortality
download_url: https://data.gov.au/data/dataset/05696f6f-6ff5-42a2-904f-af5e4d1f56f8/resource/7fbac314-4bf9-4601-b812-0307316ef5a4/download/acimcombinedcounts.csv
discovery:
  package_id: australian-cancer-incidence-and-mortality
  resource_name: ACIM Combined Counts
format: csv
header_row: 1
layout: wide
cache_kind: data
period_dimension: year
# Default-filter slice applied by latest() so the no-filter call returns
# one canonical headline row per year. ACIM does NOT publish an
# "All cancers combined" aggregate row — every Cancer_Type is a distinct
# site. We default to Bowel cancer (one of the most diagnosed cancers
# in Australia and a long-running AIHW headline series) with sex=Persons
# and type=Incidence so latest() collapses to a single row per year.
# Customers wanting a different cancer override via filters.
headline_slice:
  cancer_type: Bowel cancer
  sex: Persons
  type: Incidence
search_keywords:
  - cancer
  - cancer incidence
  - cancer mortality
  - breast cancer
  - bowel cancer
  - lung cancer
  - prostate cancer
  - melanoma
  - acim
  - age band cancer
  - oncology
